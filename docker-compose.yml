version: '3.8'
services:
  fk-tool:
    build: .
    container_name: fk-tool
    restart: unless-stopped
    ports:
      - "3001:3000"   # host port 3001 → container port 3000
    env_file:
      - .env.production   # lives on server only, never committed
    environment:
      NODE_ENV: production
